<!DOCTYPE html>
<html>
<head>
    <title>Insertion Sort</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .bar { display: inline-block; width: 20px; margin-right: 5px; background: #9b59b6; vertical-align: bottom; }
    </style>
</head>
<body>
    <div class="nav"><a href="./index.html">← Back Home</a></div>
    <h1>Insertion Sort Visualizer</h1>
    <div id="container" style="height: 200px; border-bottom: 2px solid #000; margin-bottom: 20px;"></div>
    <button onclick="sort()">Start Insertion Sort</button>

    <script>
        let data = [35, 10, 45, 20, 5, 30];
        const cont = document.getElementById('container');

        function draw() {
            cont.innerHTML = '';
            data.forEach(h => {
                const div = document.createElement('div');
                div.className = 'bar';
                div.style.height = (h * 3) + 'px';
                cont.appendChild(div);
            });
        }

        async function sort() {
            for (let i = 1; i < data.length; i++) {
                let key = data[i];
                let j = i - 1;
                while (j >= 0 && data[j] > key) {
                    data[j + 1] = data[j];
                    j = j - 1;
                    draw();
                    await new Promise(r => setTimeout(r, 300));
                }
                data[j + 1] = key;
                draw();
                await new Promise(r => setTimeout(r, 300));
            }
        }
        draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; background-color: #f4f4f9; }
        header { background-color: teal; color: white; padding: 20px 0; mb: 20px; }
        .container { margin: 50px auto; max-width: 600px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .array-display { font-size: 24px; font-weight: bold; color: teal; margin: 20px 0; letter-spacing: 2px; }
        button { background-color: rgb(10, 34, 116); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: darkcyan; }
        .back-link { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>Bubble Sort Algorithm</h1>
</header>

<div class="container">
    <p>Current Array:</p>
    <div id="array-output" class="array-display">[29, 10, 14, 37, 13]</div>
    
    <button onclick="startSort()">Sort Now</button>
    
    <p id="status">Click the button to see the result!</p>
    
    <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script>
    function bubbleSort(arr) {
        let n = arr.length;
        for (let i = 0; i < n - 1; i++) {
            for (let j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {
                    [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]]; // Modern swap
                }
            }
        }
        return arr;
    }

    function startSort() {
        const numbers = [29, 10, 14, 37, 13];
        const sorted = bubbleSort(numbers);
        document.getElementById('array-output').innerText = "[" + sorted.join(", ") + "]";
        document.getElementById('status').innerText = "Array Sorted Successfully!";
    }
</script>

</body>
</html>

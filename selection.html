<!DOCTYPE html>
<html>
<head>
    <title>Selection Sort</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .bar { display: inline-block; width: 20px; margin-right: 5px; background: #e67e22; vertical-align: bottom; }
    </style>
</head>
<body>
    <div class="nav"><a href="./index.html">← Back Home</a></div>
    <h1>Selection Sort Visualizer</h1>
    <div id="container" style="height: 200px; border-bottom: 2px solid #000; margin-bottom: 20px;"></div>
    <button onclick="sort()">Start Selection Sort</button>

    <script>
        let data = [45, 12, 8, 33, 21, 50, 5];
        const cont = document.getElementById('container');

        function draw() {
            cont.innerHTML = '';
            data.forEach(h => {
                const div = document.createElement('div');
                div.className = 'bar';
                div.style.height = (h * 3) + 'px';
                cont.appendChild(div);
            });
        }

        async function sort() {
            let n = data.length;
            for (let i = 0; i < n; i++) {
                let min = i;
                for (let j = i + 1; j < n; j++) {
                    if (data[j] < data[min]) min = j;
                }
                if (min !== i) {
                    [data[i], data[min]] = [data[min], data[i]];
                    draw();
                    await new Promise(r => setTimeout(r, 600));
                }
            }
        }
        draw();
    </script>
</body>
</html>

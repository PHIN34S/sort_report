<!DOCTYPE html>
<html>
<head>
    <title>Bubble Sort Page</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .bar { display: inline-block; width: 20px; margin-right: 5px; background: teal; vertical-align: bottom; }
    </style>
</head>
<body>
    <div class="nav"><a href="./index.html">← Back Home</a></div>
    <h1>Bubble Sort Visualizer</h1>
    <div id="container" style="height: 200px; border-bottom: 2px solid #000;"></div>
    <button onclick="sort()">Start Sort</button>

    <script>
        let data = [40, 10, 30, 20, 50];
        const cont = document.getElementById('container');
        function draw() {
            cont.innerHTML = '';
            data.forEach(h => {
                const div = document.createElement('div');
                div.className = 'bar';
                div.style.height = (h * 3) + 'px';
                cont.appendChild(div);
            });
        }
        async function sort() {
            for(let i=0; i<data.length; i++) {
                for(let j=0; j<data.length-i-1; j++) {
                    if(data[j] > data[j+1]) {
                        [data[j], data[j+1]] = [data[j+1], data[j]];
                        draw();
                        await new Promise(r => setTimeout(r, 400));
                    }
                }
            }
        }
        draw();
    </script>
</body>
</html>

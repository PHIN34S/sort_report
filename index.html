<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Lab | Home</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: var(--card);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 2rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; flex-direction: column; gap: 1rem; }
        a {
            text-decoration: none;
            color: #e2e8f0;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        a:hover {
            background: var(--primary);
            transform: translateY(-3px);
            border-color: #818cf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Algorithm Lab</h1>
        <div class="nav-links">
            <a href="bubble-sort.html">🫧 Bubble Sort Visualization</a>
            <a href="selection-sort.html">🔍 Selection Sort Visualization</a>
            <a href="insertion-sort.html">🃏 Insertion Sort Visualization</a>
        </div>
    </div>
</body>
</html>

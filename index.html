<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Algorithm Gallery</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f2f5; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: teal; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Sorting Algorithm Dashboard</h1>
    <div class="grid">
        <div class="card">
            <h3>Bubble Sort</h3>
            <p>Swaps adjacent elements if they are in the wrong order.</p>
            <a href="bubble.html" class="btn">View</a>
        </div>
        <div class="card">
            <h3>Selection Sort</h3>
            <p>Finds the minimum element and puts it at the beginning.</p>
            <a href="selection.html" class="btn">View</a>
        </div>
        <div class="card">
            <h3>Insertion Sort</h3>
            <p>Builds the final sorted array one item at a time.</p>
            <a href="insertion.html" class="btn">View</a>
        </div>
    </div>
</body>
</html>

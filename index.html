<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; background-color: #f4f4f9; }
        header { background-color: teal; color: white; padding: 40px 0; }
        .container { margin: 50px auto; max-width: 600px; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .link-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: teal;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .link-button:hover { background-color: #006666; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <h1>Sorting Algorithms Library</h1>
        <p>Select an algorithm to visualize its logic</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Bubble Sort</h2>
            <p>The simplest sorting algorithm that works by repeatedly swapping adjacent elements if they are in the wrong order.</p>
            <a href="bubble_sort.html" class="link-button">Launch Visualizer →</a>
        </div>
    </div>
</body>
</html>

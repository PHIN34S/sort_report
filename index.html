<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            line-height: 1.6;
            background-color: #f4f7f6;
            color: #333;
        }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: teal; border-bottom: 2px solid teal; padding-bottom: 10px; }
        .card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); border-color: teal; }
        .btn {
            display: inline-block;
            background: teal;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 15px;
        }
        .btn:hover { background: #006d6d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Algorithm Visualizers</h1>
        <p>Welcome! Select an algorithm below to see how it works step-by-step.</p>

        <div class="card">
            <h3>Bubble Sort</h3>
            <p>A simple sorting algorithm that repeatedly steps through the list, compares adjacent elements, and swaps them if they are in the wrong order.</p>
            <a href="bubble.html" class="btn">View Visualizer</a>
        </div>
        
        </div>

</body>
</html>
